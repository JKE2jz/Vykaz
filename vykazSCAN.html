<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skenování výkazů</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #e8ff47;
    --accent2: #47b4ff;
    --accent3: #ff6b6b;
    --text: #f0f0f5;
    --text2: #9090a8;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== START SCREEN ===== */
  #screen-start {
    align-items: center;
    justify-content: center;
    padding: 20px 20px 40px;
  }
  .start-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 480px;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .start-title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 28px;
    line-height: 1.2;
  }
  .start-title span { color: var(--accent); }

  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  input[type="text"], input[type="date"], input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .saved-actions { margin-top: 12px; }
  .saved-action-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .saved-action-item:hover { border-color: var(--accent2); }
  .saved-action-name { font-weight: 500; font-size: 13px; }
  .saved-action-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .saved-action-del {
    background: none;
    border: none;
    color: var(--accent3);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 20px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0f0f13;
    width: 100%;
    justify-content: center;
    font-size: 15px;
    padding: 13px 20px;
  }
  .btn-primary:hover { background: #d4eb30; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-danger {
    background: rgba(255,107,107,0.15);
    color: var(--accent3);
    border: 1px solid rgba(255,107,107,0.3);
  }

  /* ===== APP SCREEN ===== */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .topbar-name {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
  }
  .topbar-date { font-size: 12px; color: var(--text2); }
  .topbar-count {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .topbar-count span { color: var(--accent); font-weight: 700; }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    gap: 4px;
  }
  .tab {
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; flex: 1; overflow-y: auto; }
  .tab-content.active { display: block; }

  /* ===== SCAN TAB ===== */
  .scan-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .form-section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .api-status { font-size: 12px; margin-top: 8px; }

  .scan-list { margin-top: 12px; }
  .scan-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .scan-item-info { flex: 1; }
  .scan-item-name { font-weight: 500; }
  .scan-item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .scan-item-del {
    background: none;
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--accent3);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .drop-zone:hover { border-color: var(--accent); }
  .drop-zone-icon { font-size: 36px; margin-bottom: 8px; }
  .drop-zone-text { color: var(--text2); font-size: 13px; }
  .drop-zone-sub { color: var(--text2); font-size: 11px; margin-top: 4px; }

  .preview-img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 12px;
    max-height: 400px;
    object-fit: contain;
  }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    margin: 12px 0;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s;
  }
  .progress-label { font-size: 12px; color: var(--text2); text-align: center; }

  /* ===== REPORT TAB ===== */
  .report-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }
  .report-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .report-card-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; line-height: 1.3; }
  .report-card-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .report-card-value.blue { color: var(--accent2); }
  .report-card-value.red { color: var(--accent3); }
  .report-section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .drugs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .drug-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .drug-name { font-size: 12px; }
  .drug-count { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent2); font-weight: 700; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    padding: 28px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 9999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="screen-start" class="screen active">
  <div class="start-box">
    <div class="logo">Hard&amp;Smart</div>
    <h1 class="start-title">Skenování<br><span>výkazů</span></h1>

    <div class="form-group">
      <label>Název akce / párty</label>
      <input type="text" id="start-name" placeholder="např. Technoparty XYZ">
    </div>
    <div class="form-group">
      <label>Datum</label>
      <input type="date" id="start-date">
    </div>
    <div class="form-group">
      <label>API klíč (Anthropic)</label>
      <input type="password" id="start-apikey" placeholder="sk-ant-...">
      <div style="font-size:11px;color:var(--text2);margin-top:4px;">Uloží se lokálně v prohlížeči</div>
    </div>

    <button class="btn btn-primary" style="margin-bottom:10px;" onclick="startNewAction()">✦ Skenovat novou akci</button>

    <hr class="divider">

    <div style="font-size:12px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500;">Uložené akce:</div>
    <div id="saved-actions-list" class="saved-actions"></div>
    <div style="text-align:right;font-size:11px;color:var(--text2);margin-top:16px;">© 2026 Hard &amp; Smart</div>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="screen-app" class="screen">
  <div class="topbar">
    <div>
      <div class="topbar-name" id="topbar-name">—</div>
      <div class="topbar-date" id="topbar-date">—</div>
    </div>
    <div class="topbar-count">Scany: <span id="topbar-count">0</span></div>
    <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;" onclick="goHome()">← Domů</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('scan')">⊕ Skenovat</div>
    <div class="tab" onclick="switchTab('report')">◈ Report</div>
  </div>

  <!-- SCAN TAB -->
  <div id="tab-scan" class="tab-content active">
    <div class="scan-container">

      <!-- Nahrané scany -->
      <div class="form-section">
        <div class="form-section-title">Nahrané výkazy (<span id="scan-count">0</span>)</div>
        <div id="scan-list">
          <div style="color:var(--text2);font-size:13px;">Zatím žádné scany</div>
        </div>
      </div>

      <!-- Přidat nový scan -->
      <div class="form-section">
        <div class="form-section-title">Přidat výkaz</div>
        <div class="drop-zone" onclick="document.getElementById('file-input').click()"
          ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
          ondragleave="this.style.borderColor=''"
          ondrop="handleDrop(event)">
          <div class="drop-zone-icon">📄</div>
          <div class="drop-zone-text">Klikni nebo přetáhni foto výkazu</div>
          <div class="drop-zone-sub">JPG, PNG</div>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this.files[0])">
      </div>

      <!-- Preview + zpracování -->
      <div id="preview-section" style="display:none;">
        <div class="form-section">
          <div class="form-section-title">Náhled</div>
          <img id="preview-img" class="preview-img">
          <div id="progress-wrap" style="display:none;">
            <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
            <div class="progress-label" id="progress-label">Zpracovávám...</div>
          </div>
          <div style="display:flex;gap:10px;margin-top:12px;">
            <button class="btn btn-secondary" style="flex:1;justify-content:center;" onclick="cancelPreview()">Zrušit</button>
            <button class="btn btn-primary" style="flex:1;" id="process-btn" onclick="processScan()">⊕ Zpracovat</button>
          </div>
          <button class="btn btn-danger" id="cancel-btn" style="display:none;width:100%;justify-content:center;margin-top:8px;" onclick="cancelScan()">✕ Zastavit</button>
        </div>
      </div>

    </div>
  </div>

  <!-- REPORT TAB -->
  <div id="tab-report" class="tab-content">
    <div class="report-container">
      <div class="report-header">
        <div>
          <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:4px;">SOUČTOVÝ REPORT</div>
          <div id="report-title" style="font-size:22px;font-weight:600;"></div>
        </div>
        <button class="btn btn-secondary" onclick="exportReport()">↓ Export (Excel)</button>
      </div>
      <div id="report-content"></div>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal" style="text-align:center;">
    <div id="confirm-msg" style="font-size:16px;font-weight:600;margin-bottom:24px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-secondary" id="confirm-no" style="flex:1;justify-content:center;">Zrušit</button>
      <button class="btn btn-danger" id="confirm-yes" style="flex:1;justify-content:center;">Smazat</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const DRUGS = ['alkohol','tabak','thc','extaze','kokain','mefedron','speed','lsd','lysohlavky','pervitin','poppers','heroin','kratom','ketamin','leky','kanabinoidy','jine'];
const DRUG_LABELS = ['Alkohol','Tabák','THC','Extáze','Kokain','Mefedron/Katinony','Speed','LSD','Lysohlávky','Pervitin','Poppers','Heroin','Kratom','Ketamin','Léky na předpis','Další kanabinoidy','Jiné'];

let currentAction = null;
let scans = []; // [{id, name, records:[]}]
let pendingImageBase64 = null;
let scanAbortController = null;

// ===== STORAGE =====
let _memStore = [];
function getActions() {
  try { const ls = localStorage.getItem('hns_scan_actions'); if (ls) return JSON.parse(ls); } catch(e) {}
  return _memStore;
}
function saveActions(actions) {
  _memStore = actions;
  try { localStorage.setItem('hns_scan_actions', JSON.stringify(actions)); } catch(e) {}
}
function saveCurrentAction() {
  if (!currentAction) return;
  const actions = getActions();
  const idx = actions.findIndex(a => a.id === currentAction.id);
  const data = { ...currentAction, scans };
  if (idx >= 0) actions[idx] = data; else actions.push(data);
  saveActions(actions);
}

// ===== INIT =====
window.onload = () => {
  document.getElementById('start-date').valueAsDate = new Date();
  const savedKey = localStorage.getItem('hns_api_key') || '';
  if (savedKey) document.getElementById('start-apikey').value = savedKey;
  renderSavedActions();
};

function renderSavedActions() {
  const list = document.getElementById('saved-actions-list');
  const actions = getActions();
  if (!actions.length) { list.innerHTML = '<div style="color:var(--text2);font-size:13px;">Žádné uložené akce</div>'; return; }
  list.innerHTML = actions.map(a => `
    <div class="saved-action-item" onclick="loadAction('${a.id}')">
      <div>
        <div class="saved-action-name">${a.name}</div>
        <div class="saved-action-meta">${a.date} · ${(a.scans||[]).length} scanů</div>
      </div>
      <button class="saved-action-del" onclick="event.stopPropagation();deleteAction('${a.id}')">✕</button>
    </div>
  `).join('');
}

function startNewAction() {
  const name = document.getElementById('start-name').value.trim();
  const date = document.getElementById('start-date').value;
  const apikey = document.getElementById('start-apikey').value.trim();
  if (!name || !date) { showToast('Vyplň název akce a datum.'); return; }
  if (!apikey) { showToast('Zadej API klíč.'); return; }
  localStorage.setItem('hns_api_key', apikey);
  currentAction = { id: Date.now().toString(), name, date, scans: [] };
  scans = [];
  saveCurrentAction();
  showApp();
}

function loadAction(id) {
  const actions = getActions();
  const a = actions.find(x => x.id === id);
  if (!a) return;
  currentAction = a;
  scans = a.scans || [];
  const savedKey = localStorage.getItem('hns_api_key') || '';
  if (savedKey) document.getElementById('start-apikey').value = savedKey;
  showApp();
}

function deleteAction(id) {
  showConfirm('Smazat tuto akci?', () => {
    const actions = getActions().filter(a => a.id !== id);
    saveActions(actions);
    renderSavedActions();
  });
}

function goHome() {
  saveCurrentAction();
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-start').classList.add('active');
  renderSavedActions();
}

function showApp() {
  document.getElementById('screen-start').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('topbar-name').textContent = currentAction.name;
  document.getElementById('topbar-date').textContent = currentAction.date;
  switchTab('scan');
  renderScanList();
  renderReport();
  window.scrollTo({ top: 0 });
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['scan','report'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'report') renderReport();
}

// ===== FILE HANDLING =====
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-section').style.display = 'block';
    document.getElementById('file-input').value = '';
  };
  reader.readAsDataURL(file);
}

function cancelPreview() {
  pendingImageBase64 = null;
  document.getElementById('preview-section').style.display = 'none';
}

function cancelScan() {
  if (scanAbortController) { scanAbortController.abort(); scanAbortController = null; }
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('process-btn').style.display = '';
  document.getElementById('process-btn').disabled = false;
  document.getElementById('process-btn').textContent = '⊕ Zpracovat';
  document.getElementById('progress-wrap').style.display = 'none';
  showToast('Zpracování zrušeno.');
}

// ===== SCAN API =====
async function callAPI(promptText, progressPct, progressMsg) {
  const apiKey = localStorage.getItem('hns_api_key');
  setProgress(progressPct, progressMsg);
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    signal: scanAbortController.signal,
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5-20250929',
      max_tokens: 4000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: pendingImageBase64 } },
        { type: 'text', text: promptText }
      ]}]
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content[0].text.trim();
  let clean = text.replace(/```json|```/g, '').trim();
  if (!clean.endsWith(']')) {
    const last = clean.lastIndexOf('},');
    clean = last > 0 ? clean.substring(0, last+1)+']' : clean.substring(0, clean.lastIndexOf('}')+1)+']';
  }
  return JSON.parse(clean);
}

function setProgress(pct, msg) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = msg;
}

async function processScan() {
  const apiKey = localStorage.getItem('hns_api_key');
  if (!apiKey) { showToast('Chybí API klíč — vrať se na úvodní stránku.'); return; }
  if (!pendingImageBase64) return;

  const processBtn = document.getElementById('process-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  processBtn.style.display = 'none';
  cancelBtn.style.display = '';
  document.getElementById('progress-wrap').style.display = 'block';
  scanAbortController = new AbortController();

  try {
    // PRŮCHOD 1: Typ kontaktu + pohlaví + OUT + PK
    const p1 = `Toto je papírový výkaz harm reduction. Soustřeď se POUZE na první 4 sloupce tabulky.

SLOUPEC 1 - Č.Ř.: číslo řádku.
OPAKOVANÝ KONTAKT: pokud je číslo řádku ZAKROUŽKOVANÉ (má kolem sebe kruh nebo ovál) → typ="Opakovaný"
Pokud sloupec M/Ž/ODM obsahuje "ODM" → typ="Odmítnutý"
Jinak → typ="Klient"

SLOUPEC 2 - M/Ž/ODM: písmeno v buňce. M nebo m = "M", Ž nebo ž = "Ž".

SLOUPEC 3 - OUT: číslo stříkaček v buňce. Prázdné = 0. Pokud si nejsi jistý = 0.

SLOUPEC 4 - PK: fajfka/v/u/✓ = true, prázdné = false. Opakovaný kontakt má vždy pk=false.

Ignoruj sloupce 5 a dále. Ignoruj legendu dole.
Zpracuj každý řádek PRÁVĚ JEDNOU.
Vrať POUZE JSON pole bez markdown:
[{"pohlavi":"M","typ":"Klient","out":0,"pk":false}]`;

    const pass1 = await callAPI(p1, 15, 'Průchod 1/5 — typ a pohlaví...');

    // PRŮCHOD 2: Fajfky (sloupce 7-15)
    const p2 = `Toto je papírový výkaz harm reduction. Soustřeď se POUZE na sloupce 7-15 tabulky.

Každý z těchto sloupců obsahuje buď fajfku (✓, v, u nebo jakýkoliv symbol) nebo je prázdný.
Fajfka/symbol = true, prázdné = false.

- Sloupec 7 = odkaz (Odkaz do služby)
- Sloupec 8 = individ (Individ. poradenství)
- Sloupec 9 = alkotest (Alko test)
- Sloupec 10 = tonometr (Tono test)
- Sloupec 11 = testy (Výdej testovacího kitu)
- Sloupec 12 = predavk (Předávkování)
- Sloupec 13 = intox (Řešení akut. intox.)
- Sloupec 14 = zdrav (Zdrav. ošetření)
- Sloupec 15 = kontprace (Kontaktní práce)

Ignoruj sloupce 1-6 a sloupec 16. Ignoruj legendu dole.
Zpracuj každý řádek PRÁVĚ JEDNOU.
Vrať POUZE JSON pole bez markdown:
[{"odkaz":false,"individ":false,"alkotest":false,"tonometr":false,"testy":false,"predavk":false,"intox":false,"zdrav":false,"kontprace":false}]`;

    const pass2 = await callAPI(p2, 30, 'Průchod 2/5 — fajfky...');

    // PRŮCHOD 3: HR - jen čísla
    const p3 = `Toto je papírový výkaz harm reduction. Soustřeď se POUZE na 5. sloupec zleva — sloupec HR (hned za sloupcem PK).

Pro každý řádek přečti PŘESNĚ čísla která vidíš v HR sloupci. Nic nepřekládej, jen přepiš čísla.
Čísla jsou 1-9, oddělena čárkou nebo lomítkem. Prázdné/šedé = [].
Příklad: "1,3" → [1,3], "6" → [6], prázdné → []
IGNORUJ sloupec Info hned vpravo od HR. IGNORUJ legendu dole.
Zpracuj každý řádek PRÁVĚ JEDNOU.
Vrať POUZE JSON pole bez markdown:
[{"hr":[]}]`;

    const pass3raw = await callAPI(p3, 50, 'Průchod 3/5 — HR materiál...');
    const hrLabels = ['Leták','Kondomy','Špunty','Filtry','Šňupátka/Kapsle','Vitamíny/Voda','Mat. k i.v. aplik.','Žvýkačky','Jiný'];
    const pass3 = pass3raw.map(r => ({
      hrCount: (r.hr||[]).length,
      hr: (r.hr||[]).flatMap(n => {
        const str = String(n).replace(/[^\d,]/g,'');
        return str.split(',').map(s => { const num=parseInt(s.trim()); return (num>=1&&num<=9)?hrLabels[num-1]:null; }).filter(Boolean);
      })
    }));

    // PRŮCHOD 4: Info - jen čísla
    const p4 = `Toto je papírový výkaz harm reduction. Soustřeď se POUZE na 6. sloupec zleva — sloupec Info (hned za sloupcem HR).

Pro každý řádek přečti PŘESNĚ čísla která vidíš v Info sloupci. Nic nepřekládej, jen přepiš čísla.
Čísla jsou 1-8, oddělena čárkou nebo lomítkem. Prázdné/šedé = [].
Příklad: "8" → [8], "1,8" → [1,8], prázdné → []
IGNORUJ sloupec HR hned vlevo. IGNORUJ legendu dole.
Zpracuj každý řádek PRÁVĚ JEDNOU.
Vrať POUZE JSON pole bez markdown:
[{"info":[]}]`;

    const pass4raw = await callAPI(p4, 70, 'Průchod 4/5 — Info servis...');
    const infoLabels = ['Bezpečnější užívání','Bezpečný sex','Vitamíny/Dehydratace','Ochrana sluchu','Alko/Tono/CO info','Bezpečná přeprava','Další zdrav./soc.','Jiné'];
    const pass4 = pass4raw.map(r => ({
      infoCount: (r.info||[]).length,
      info: (r.info||[]).flatMap(n => {
        const str = String(n).replace(/[^\d,]/g,'');
        return str.split(',').map(s => { const num=parseInt(s.trim()); return (num>=1&&num<=8)?infoLabels[num-1]:null; }).filter(Boolean);
      })
    }));

    // PRŮCHOD 5: Drogy
    const p5 = `Toto je papírový výkaz harm reduction. Soustřeď se POUZE na poslední sloupec — Primární drogy / kombi.

Pro každý řádek přečti zkratky drog. Převeď:
ALK/Alko→Alkohol, TAB→Tabák, THC→THC, MDMA/EXT→Extáze, KOK→Kokain, MEF→Mefedron/Katinony, SPE→Speed, LSD→LSD, LYS→Lysohlávky, PER/PERV→Pervitin, POP→Poppers, HER→Heroin, KRA→Kratom, KET→Ketamin, LEK→Léky na předpis, KAN→Další kanabinoidy
Pokud je více drog oddělených čárkou/mezerou, zahrň VŠECHNY.
Prázdné → []
IGNORUJ ostatní sloupce. IGNORUJ legendu dole.
Zpracuj každý řádek PRÁVĚ JEDNOU.
Vrať POUZE JSON pole bez markdown:
[{"drogy":[]}]`;

    const pass5 = await callAPI(p5, 88, 'Průchod 5/5 — drogy...');

    // Sloučení
    const records = pass1.map((r, i) => {
      const drogyRaw = (pass5[i]||{}).drogy || [];
      const drogyKeys = drogyRaw.map(d => {
        const idx = DRUG_LABELS.findIndex(l => l.toLowerCase().includes(d.toLowerCase()) || d.toLowerCase().includes(l.toLowerCase()));
        return idx >= 0 ? DRUGS[idx] : null;
      }).filter(Boolean);

      return {
        pohlavi: r.pohlavi || 'M',
        typ: r.typ || 'Klient',
        out: (Number.isInteger(r.out) && r.out >= 0 && r.out <= 200) ? r.out : 0,
        pk: r.typ === 'Opakovaný' ? false : !!r.pk,
        hr: (pass3[i]||{}).hr || [],
        hrCount: (pass3[i]||{}).hrCount || 0,
        info: (pass4[i]||{}).info || [],
        infoCount: (pass4[i]||{}).infoCount || 0,
        odkaz: !!(pass2[i]||{}).odkaz,
        individ: !!(pass2[i]||{}).individ,
        alkotest: !!(pass2[i]||{}).alkotest,
        tonometr: !!(pass2[i]||{}).tonometr,
        testy: !!(pass2[i]||{}).testy,
        predavk: !!(pass2[i]||{}).predavk,
        intox: !!(pass2[i]||{}).intox,
        zdrav: !!(pass2[i]||{}).zdrav,
        kontprace: !!(pass2[i]||{}).kontprace,
        drogy: drogyKeys,
      };
    });

    setProgress(100, 'Hotovo!');

    // Přidat scan
    const scanId = Date.now().toString();
    const scanName = 'Výkaz ' + (scans.length + 1);
    scans.push({ id: scanId, name: scanName, records, count: records.length });
    saveCurrentAction();
    updateCount();
    renderScanList();
    renderReport();

    setTimeout(() => {
      cancelPreview();
      document.getElementById('progress-wrap').style.display = 'none';
      showToast('✓ Zpracováno ' + records.length + ' záznamů.');
    }, 600);

  } catch(e) {
    if (e.name === 'AbortError') showToast('Zpracování zrušeno.');
    else showToast('Chyba: ' + e.message);
  }

  processBtn.style.display = '';
  processBtn.disabled = false;
  processBtn.textContent = '⊕ Zpracovat';
  cancelBtn.style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  scanAbortController = null;
}

// ===== RENDER SCAN LIST =====
function updateCount() {
  const total = scans.reduce((a,s) => a + s.records.length, 0);
  document.getElementById('topbar-count').textContent = scans.length;
  document.getElementById('scan-count').textContent = scans.length;
}

function renderScanList() {
  const list = document.getElementById('scan-list');
  updateCount();
  if (!scans.length) { list.innerHTML = '<div style="color:var(--text2);font-size:13px;">Zatím žádné scany</div>'; return; }
  list.innerHTML = scans.map((s, i) => `
    <div class="scan-item">
      <div class="scan-item-info">
        <div class="scan-item-name">${s.name}</div>
        <div class="scan-item-meta">${s.records.length} záznamů</div>
      </div>
      <button class="scan-item-del" onclick="deleteScan('${s.id}')">✕</button>
    </div>
  `).join('');
}

function deleteScan(id) {
  showConfirm('Smazat tento scan?', () => {
    scans = scans.filter(s => s.id !== id);
    saveCurrentAction();
    renderScanList();
    renderReport();
  });
}

// ===== REPORT =====
function getAllRecords() {
  return scans.flatMap(s => s.records);
}

function calcReport() {
  const records = getAllRecords();
  const isKlient = r => r.typ === 'Klient';
  const isOpak = r => r.typ === 'Opakovaný';
  const isOdm = r => r.typ === 'Odmítnutý';
  const c = fn => records.filter(fn).length;
  const sum = fn => records.reduce((a,r) => a + fn(r), 0);

  return {
    ivKlienti: c(r => isKlient(r) && r.out > 0),
    outCelkem: sum(r => r.out),
    klientosetkani: c(r => isKlient(r) || isOpak(r)),
    klienti: c(isKlient),
    prvokontakty: c(r => r.pk),
    hrCelkem: sum(r => r.hrCount || r.hr.length),
    klientHr: c(r => isKlient(r) && (r.hrCount||r.hr.length) > 0),
    infoCelkem: sum(r => r.infoCount || r.info.length),
    klientInfo: c(r => isKlient(r) && (r.infoCount||r.info.length) > 0),
    odkazyCelkem: c(r => r.odkaz),
    individCelkem: c(r => r.individ),
    alkotestCelkem: c(r => r.alkotest),
    tonometrCelkem: c(r => r.tonometr),
    testyKitCelkem: c(r => r.testy),
    predavkCelkem: c(r => r.predavk),
    intoxCelkem: c(r => r.intox),
    zdravCelkem: c(r => r.zdrav),
    kontpraceCelkem: c(r => r.kontprace),
    kontpraceKlienti: c(r => isKlient(r) && r.kontprace),
    klientiMuzi: c(r => isKlient(r) && r.pohlavi === 'M'),
    klientiZeny: c(r => isKlient(r) && r.pohlavi === 'Ž'),
    klientiDrogy: c(r => isKlient(r) && r.drogy.length > 0),
    klientkyZenyDrogy: c(r => isKlient(r) && r.pohlavi === 'Ž' && r.drogy.length > 0),
    klientiBezInfoKont: c(r => isKlient(r) && (r.infoCount||r.info.length) === 0 && !r.kontprace),
    odmCelkem: c(isOdm),
    drogy: DRUGS.map(d => c(r => r.drogy.includes(d))),
  };
}

function renderReport() {
  const records = getAllRecords();
  if (!records.length) {
    document.getElementById('report-content').innerHTML = '<div class="empty-state"><div class="empty-state-icon">◈</div><div class="empty-state-text">Zatím žádná data — přidej scany</div></div>';
    document.getElementById('report-title').textContent = currentAction ? currentAction.name : '';
    return;
  }
  const s = calcReport();
  document.getElementById('report-title').textContent = currentAction.name;

  const card = (label, value, cls='') =>
    `<div class="report-card"><div class="report-card-label">${label}</div><div class="report-card-value ${cls}">${value}</div></div>`;

  document.getElementById('report-content').innerHTML = `
    <div class="report-section-title">Základní přehledy</div>
    <div class="report-grid">
      ${card('Klientosetkání', s.klientosetkani)}
      ${card('Klienti', s.klienti)}
      ${card('Opakované kontakty', s.klientosetkani - s.klienti, 'blue')}
      ${card('Prvokontakty', s.prvokontakty)}
      ${card('Odmítnuté kontakty', s.odmCelkem, 'red')}
    </div>
    <div class="report-section-title">Pohlaví klientů</div>
    <div class="report-grid">
      ${card('Klienti — muži', s.klientiMuzi)}
      ${card('Klienti — ženy', s.klientiZeny)}
    </div>
    <div class="report-section-title">Stříkačky</div>
    <div class="report-grid">
      ${card('i.v. Klienti (OUT > 0)', s.ivKlienti)}
      ${card('Vydané stříkačky celkem', s.outCelkem)}
    </div>
    <div class="report-section-title">Harm Reduction</div>
    <div class="report-grid">
      ${card('HR materiál — celkem vydaných', s.hrCelkem)}
      ${card('Klienti s ≥1 HR materiálem', s.klientHr)}
    </div>
    <div class="report-section-title">Informační servis</div>
    <div class="report-grid">
      ${card('Info servis — celkem témat', s.infoCelkem)}
      ${card('Klienti s ≥1 info servisem', s.klientInfo)}
    </div>
    <div class="report-section-title">Poradenství &amp; intervence</div>
    <div class="report-grid">
      ${card('Odkaz do služby', s.odkazyCelkem)}
      ${card('Individuální poradenství', s.individCelkem)}
      ${card('Alkotest', s.alkotestCelkem)}
      ${card('Tonometr', s.tonometrCelkem)}
      ${card('Výdej testovacího kitu', s.testyKitCelkem)}
      ${card('CO test', '—', 'blue')}
      ${card('Předávkování', s.predavkCelkem, s.predavkCelkem > 0 ? 'red' : '')}
      ${card('Řešení akutní intoxikace', s.intoxCelkem, s.intoxCelkem > 0 ? 'red' : '')}
      ${card('Zdravotní ošetření', s.zdravCelkem)}
      ${card('Kontaktní práce — celkem', s.kontpraceCelkem)}
      ${card('Kontaktní práce — klienti', s.kontpraceKlienti)}
    </div>
    <div class="report-section-title">Drogy</div>
    <div class="report-grid">
      ${card('Klienti s ≥1 drogou', s.klientiDrogy)}
      ${card('Klientky ženy s ≥1 drogou', s.klientkyZenyDrogy)}
      ${card('Klienti bez info servisu ani kont. práce', s.klientiBezInfoKont)}
    </div>
    <div class="drugs-grid">
      ${DRUG_LABELS.map((label, i) => `
        <div class="drug-card"><span class="drug-name">${label}</span><span class="drug-count">${s.drogy[i]}</span></div>
      `).join('')}
    </div>
  `;
}

// ===== EXPORT =====
function exportReport() {
  if (!getAllRecords().length) { showToast('Žádná data k exportu.'); return; }
  const s = calcReport();
  const akceInfo = [currentAction.date, currentAction.name].filter(Boolean).join(' | ');
  const header = ['Akce','i.v. Klienti','Vydané stříkačky','Klientosetkání','Klienti','Prvokontakty','HR celkem','Klienti s HR','Info celkem','Klienti s Info','Odkaz do služby','Individ. poradenství','Alkotest','Tonometr','Výdej test kitu','CO test','Předávkování','Řešení akut. intox.','Zdrav. ošetření','Kontakt. práce celkem','Kontakt. práce klienti','Klienti muži','Klienti ženy','Klienti s drogou','Klientky ženy s drogou','Klienti bez info/kont.','Odmítnuté kontakty',...DRUG_LABELS];
  const values = [akceInfo,s.ivKlienti,s.outCelkem,s.klientosetkani,s.klienti,s.prvokontakty,s.hrCelkem,s.klientHr,s.infoCelkem,s.klientInfo,s.odkazyCelkem,s.individCelkem,s.alkotestCelkem,s.tonometrCelkem,s.testyKitCelkem,'',s.predavkCelkem,s.intoxCelkem,s.zdravCelkem,s.kontpraceCelkem,s.kontpraceKlienti,s.klientiMuzi,s.klientiZeny,s.klientiDrogy,s.klientkyZenyDrogy,s.klientiBezInfoKont,s.odmCelkem,...s.drogy];
  const ws = XLSX.utils.aoa_to_sheet([header, values]);
  ws['!cols'] = header.map((h,i) => ({ wch: i===0?40:20 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report');
  XLSX.writeFile(wb, `Report_${currentAction.name}_${currentAction.date}.xlsx`);
}

// ===== HELPERS =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

function showConfirm(msg, onYes) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('active');
  document.getElementById('confirm-yes').onclick = () => {
    document.getElementById('confirm-modal').classList.remove('active');
    onYes();
  };
  document.getElementById('confirm-no').onclick = () => {
    document.getElementById('confirm-modal').classList.remove('active');
  };
}
